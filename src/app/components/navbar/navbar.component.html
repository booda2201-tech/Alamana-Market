<header [ngClass]="{
    'fixed top-0 left-0 right-0 z-50 transition-all duration-300': true,
    'bg-white/90 backdrop-blur-md shadow-sm py-2 border-b': isScrolled,
    'bg-transparent py-3': !isScrolled
  }">
  <div class="container mx-auto px-4 flex items-center justify-between flex-row-reverse">

    <a routerLink="/" class="flex items-center gap-2 cursor-pointer no-underline flex-row-reverse">
      <div class="w-20 h-10 rounded ">
        <img src="../../../assets//images/alamanaWithoutbg.png" alt="">
      </div>
      <!-- <div class="text-right">
        <h1 class="font-bold text-xl leading-none transition-colors"
          [ngClass]="(isScrolled || currentUrl !== '/') ? 'text-gray-900' : 'text-white'">
          الأمانة
        </h1>
        <p class="text-[10px] tracking-wider uppercase transition-colors"
          [ngClass]="(isScrolled || currentUrl !== '/') ? 'text-gray-500' : 'text-white/80'">
          لمواد البناء
        </p>
      </div> -->
    </a>

    <nav class="hidden lg:flex items-center gap-8" dir="rtl">
      <div *ngFor="let link of navLinks" class="relative group">
        <a [routerLink]="link.href" [queryParams]="link.queryParams"
          class="text-sm font-medium flex items-center gap-1 hover:text-[#0275d8] transition-colors cursor-pointer no-underline py-4"
          [ngClass]="{
                  'text-[#0275d8]': currentUrl === link.href,
                  'text-gray-900': isScrolled || (currentUrl !== '/' && currentUrl !== link.href),
                  'text-white': !isScrolled && currentUrl === '/' && currentUrl !== link.href
                }">
          {{ link.name }}
          <i *ngIf="link.hasMegaMenu"
            class="bi bi-chevron-down text-[10px] group-hover:rotate-180 transition-transform"></i>
        </a>

        <div *ngIf="link.hasMegaMenu" class="absolute top-full right-0 pt-4 opacity-0 translate-y-2 pointer-events-none
                        group-hover:opacity-100 group-hover:translate-y-0 group-hover:pointer-events-auto
                        transition-all duration-300 w-64 z-[999]">
          <div
            class="bg-white rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.1)] border border-gray-100 p-2 overflow-visible">
            <div class="flex flex-col text-right" dir="rtl">
              <a *ngFor="let cat of categories" [routerLink]="['/products']" [queryParams]="{category: cat.id}"
                class="px-4 py-3 hover:bg-blue-50 rounded-lg transition-colors cursor-pointer flex items-center justify-start gap-3 no-underline group/item">
                <span class="text-sm font-medium text-gray-700 group-hover/item:text-[#0275d8]">{{ cat.name }}</span>
                <div
                  class="w-1.5 h-1.5 rounded-full bg-[#0275d8] opacity-0 group-hover/item:opacity-100 transition-opacity">
                </div>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <div class="flex items-center gap-4 flex-row-reverse">

      <button (click)="goToSearch()" class="p-2 rounded-full transition-colors hidden md:block"
        [ngClass]="(isScrolled || currentUrl !== '/') ? 'text-gray-900 hover:bg-gray-100' : 'text-white hover:bg-white/20'">
        <i class="bi bi-search text-xl"></i>
      </button>


      <a routerLink="/cart" class="relative p-2 rounded-full transition-colors no-underline"
        [ngClass]="(isScrolled || currentUrl !== '/') ? 'text-gray-900 hover:bg-gray-100' : 'text-white hover:bg-white/20'">
        <i class="bi bi-basket3 text-xl"></i>
        <span *ngIf="totalItems > 0"
          class="absolute -top-1 -left-1 w-5 h-5 bg-[#8bc34a] text-white text-[10px] font-bold rounded-full flex items-center justify-center border-2 border-white">
          {{ totalItems }}
        </span>
      </a>


        <button routerLink="/login"
          class="hidden lg:flex items-center gap-2 bttn text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-[#025bb0] transition-all flex-row-reverse">
          <span>تسجيل الدخول</span>
          <i class="bi bi-person-circle text-lg"></i>
        </button>
    



      <button class="lg:hidden p-2 rounded-full transition-transform active:scale-90" (click)="toggleMobileMenu()"
        [ngClass]="(isScrolled || currentUrl !== '/') ? 'text-gray-900' : 'text-white'">
        <i class="bi bi-list text-3xl"></i>
      </button>


    </div>

  </div>
</header>

<div *ngIf="cartMessage"
  class="fixed top-24 left-1/2 -translate-x-1/2 z-[80] bg-[#1D76B9] text-white px-5 py-3 rounded-xl shadow-lg text-sm font-bold">
  {{ cartMessage }}
</div>




<div *ngIf="isMobileMenuOpen" (click)="toggleMobileMenu()"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] lg:hidden transition-opacity">
</div>

<div
  class="fixed top-0 right-0 h-full w-[280px] bg-white z-[70] lg:hidden transform transition-transform duration-300 shadow-2xl"
  [class.translate-x-full]="!isMobileMenuOpen" [class.translate-x-0]="isMobileMenuOpen">

  <div class="p-6 border-b flex justify-between items-center flex-row-reverse">
    <span class="font-bold text-xl text-gray-900">القائمة</span>
    <button (click)="toggleMobileMenu()" class="text-gray-500">
      <i class="bi bi-x-lg text-2xl"></i>
    </button>
  </div>

  <nav class="p-4 flex flex-col gap-2 text-right">
    <a *ngFor="let link of navLinks" [routerLink]="link.href" (click)="toggleMobileMenu()"
      class="p-4 rounded-xl text-gray-700 font-medium hover:bg-blue-50 hover:text-[#0275d8] transition-all no-underline">
      {{ link.name }}
    </a>

    <div class="px-3 pt-1 pb-2">
      <div class="text-xs text-gray-400 font-bold mb-2">أقسام المنتجات</div>
      <a *ngFor="let cat of categories" [routerLink]="['/products']" [queryParams]="{category: cat.id}"
        (click)="toggleMobileMenu()"
        class="block p-3 rounded-lg text-gray-700 hover:bg-blue-50 hover:text-[#0275d8] transition-all no-underline">
        {{ cat.name }}
      </a>
    </div>

    <hr class="my-2 border-gray-100">

    <button class="w-full bttn text-white p-3 rounded-xl font-bold flex items-center justify-center gap-2">
      <span>تسجيل الدخول</span>
      <i class="bi bi-person-circle"></i>
    </button>
  </nav>
</div>
