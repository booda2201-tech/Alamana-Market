
<div class="min-h-screen flex items-center justify-center bg-gray-50 relative overflow-hidden pt-20 pb-10">

  <!-- دوائر خلفية للزينة (Decorative Orbs) -->
  <div class="absolute top-0 -right-20 w-96 h-96 bg-blue-50 rounded-full blur-3xl opacity-50"></div>
  <div class="absolute bottom-0 -left-20 w-96 h-96 bg-blue-100 rounded-full blur-3xl opacity-30"></div>

  <div class="container mx-auto px-4 relative z-10">
    <div class="max-w-xl mx-auto">
      <!-- الكارت الرئيسي -->
      <div class="bg-white rounded-[2.5rem] shadow-xl shadow-blue-900/5 border border-gray-100 overflow-hidden" data-aos="zoom-in">

        <div class="p-7 sm:p-9 text-right" dir="rtl">
          <div class="logo w-50 h-50 mb-6 mx-auto">
            <img src="../../../assets/images/logo.png" alt="">
          </div>
          <!-- اللوجو أو اسم البراند -->
          <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-gray-900 mb-2">تسجيل الدخول</h2>
            <p class="text-gray-400 font-medium">مرحباً بك مجدداً في الأمانة</p>
          </div>

              <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <!-- البريد الإلكتروني -->
                <div class="space-y-2 text-right">
                  <label class="text-sm font-bold text-gray-700 mr-1">البريد الإلكتروني</label>
                  <div class="relative">
                    <input type="email"
                            formControlName="email"
                            class="w-full h-14 bg-gray-50 border-none rounded-2xl px-6 pr-12 text-right focus:ring-2 focus:ring-[#0275d8]/20 transition-all outline-none"
                            placeholder="example@mail.com">
                    <i class="bi bi-envelope absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                  </div>
                  <p *ngIf="emailControl.touched && emailControl.invalid" class="text-red-500 text-xs">
                    أدخل بريد إلكتروني صحيح.
                  </p>
                </div>

                <!-- كلمة المرور -->
                <div class="space-y-2 text-right">
                  <div class="flex justify-between items-center mb-1" dir="rtl">
                    <label class="text-sm font-bold text-gray-700">كلمة المرور</label>
                    <a href="#" class="text-xs text-[#0275d8] font-bold hover:underline">نسيت كلمة المرور؟</a>
                  </div>
                  <div class="relative">
                    <input type="password"
                            formControlName="password"
                            class="w-full h-14 bg-gray-50 border-none rounded-2xl px-6 pr-12 text-right focus:ring-2 focus:ring-[#0275d8]/20 transition-all outline-none"
                            placeholder="••••••••">
                    <i class="bi bi-shield-lock absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                  </div>
                  <p *ngIf="passwordControl.touched && passwordControl.invalid" class="text-red-500 text-xs">
                    كلمة المرور مطلوبة.
                  </p>
                </div>

                <div *ngIf="errorMessage" class="text-red-600 text-sm bg-red-50 border border-red-100 rounded-xl p-3">
                  <p>{{ errorMessage }}</p>
                  <ul *ngIf="errorDetails.length" class="mt-2 list-disc pr-5 space-y-1 text-xs sm:text-sm">
                    <li *ngFor="let err of errorDetails">{{ err }}</li>
                  </ul>
                </div>
                <p *ngIf="successMessage" class="text-green-700 text-sm bg-green-50 border border-green-100 rounded-xl p-3">
                  {{ successMessage }}
                </p>

            <!-- زر تسجيل الدخول -->
            <button type="submit"
                    [disabled]="isSubmitting"
                    class="w-full h-14 bg-[#0275d8] text-white rounded-2xl font-bold text-lg hover:bg-[#025bb0] shadow-lg shadow-blue-200 transition-all duration-300 transform hover:-translate-y-1 mt-4">
              {{ isSubmitting ? 'جاري تسجيل الدخول...' : 'دخول' }}
            </button>

            <!-- تذكرني -->
            <div class="flex items-center justify-start gap-2 px-1">
              <input type="checkbox" formControlName="rememberMe" class="w-4 h-4 rounded-4 border-gray-300 text-[#0275d8] focus:ring-[#0275d8]">
              <span class="text-sm text-gray-500 font-medium">تذكرني على هذا الجهاز</span>
            </div>
          </form>

          <!-- إنشاء حساب -->
          <div class="mt-10 pt-8 border-t border-gray-50 text-center">
            <p class="text-gray-500 text-sm">
              ليس لديك حساب؟
              <a routerLink="/create-account" class="text-[#0275d8] font-bold hover:underline">أنشئ حسابك الآن</a>
            </p>
            <div class="mt-4 flex items-center justify-center gap-4 text-sm">
              <a routerLink="/" class="text-gray-500 hover:text-[#0275d8] transition-colors">العودة للرئيسية</a>
              <span class="text-gray-300">|</span>
              <a routerLink="/products" class="text-gray-500 hover:text-[#0275d8] transition-colors">تصفح المنتجات</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
